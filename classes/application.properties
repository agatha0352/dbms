# Application Configuration
# Application Configuration
spring.application.name=SARA-Smart-Aid-Relief-Alliance
server.port=8080
# Active profiles (enable 'dev' locally to use impersonation endpoint)
spring.profiles.active=dev

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sara_new?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=agatha0352**

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false

# Error Handling
server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Logging
logging.level.com.sara=DEBUG
logging.level.org.springframework.security=DEBUG
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - SARA</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    
</head>
<body>
        <div class="auth-container" style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#E3F2FD 0%,#F0F9FF 100%); padding:2rem;">
            <div class="auth-card w-100" style="max-width:500px; background:white; border-radius:2rem; box-shadow:0 8px 32px rgba(30,144,255,0.10); padding:2.5rem 2rem; position:relative;">
                <div class="auth-header text-center mb-4">
                    <div class="auth-icon mb-2" style="width:80px; height:80px; margin:0 auto 1rem; background:linear-gradient(135deg,#1E90FF,#00BFA6); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:2.5rem;">
                        <i class="bi bi-heart-fill"></i>
                    </div>
                    <h2 class="mb-2 fw-bold" style="font-size:2rem; color:#1E90FF;">Welcome Back</h2>
                    <p class="text-muted" style="font-size:1.1rem;">Sign in to SARA</p>
                </div>
                <div th:if="${param.logout}" class="alert alert-success mb-3 text-center">
                    <i class="bi bi-check-circle me-2"></i>
                    You have been successfully logged out.
                </div>
                <div th:if="${error}" class="alert alert-danger mb-3 text-center">
                    <i class="bi bi-exclamation-triangle me-2"></i>
                    <span th:text="${error}">Invalid credentials</span>
                </div>
                <div th:if="${message}" class="alert alert-success mb-3 text-center">
                    <i class="bi bi-check-circle me-2"></i>
                    <span th:text="${message}">Success</span>
                </div>
                <div th:if="${success}" class="alert alert-success mb-3 text-center">
                    <i class="bi bi-check-circle me-2"></i>
                    <span th:text="${success}">Success</span>
                </div>
                <form th:action="@{/login}" method="post" autocomplete="off">
                    <div class="mb-3">
                        <label for="username" class="form-label"><i class="bi bi-person me-2"></i>Username</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label"><i class="bi bi-lock me-2"></i>Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <p class="mb-2">Don't have an account?</p>
                    <a th:href="@{/register}" class="btn btn-success w-100 rounded-pill">
                        <i class="bi bi-person-plus me-2"></i>Create Account
                    </a>
                </div>
                <div class="text-center mt-3">
                    <a th:href="@{/}" class="text-muted">
                        <i class="bi bi-arrow-left me-1"></i>Back to Home
                    </a>
                </div>
            </div>
        </div>
    
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Assign Resource to Volunteer - SARA Admin</title>
    <th:block th:replace="fragments/layout :: head"></th:block>
</head>
<body>
<th:block th:replace="fragments/layout :: navbar"></th:block>
<th:block th:replace="fragments/layout :: alerts"></th:block>
        <div class="container mt-4">
            <div class="row">
                <div class="col-md-8 mx-auto">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h4 class="mb-0">
                                <i class="bi bi-person-check"></i> Assign Resource to Volunteer
                            </h4>
                        </div>
                        <div class="card-body">
                            <!-- Resource Details -->
                            <div class="alert alert-info">
                                <h5><i class="bi bi-box-seam"></i> Resource Details</h5>
                                <p class="mb-1"><strong>Name:</strong> <span th:text="${resource.name}"></span></p>
                                <p class="mb-1"><strong>Type:</strong> <span th:text="${resource.type}"></span></p>
                                <p class="mb-1"><strong>Quantity:</strong> <span th:text="${resource.quantity}"></span></p>
                                <p class="mb-1"><strong>Expiry Date:</strong> <span th:text="${resource.expiryDate != null ? resource.expiryDate : 'N/A'}"></span></p>
                                <p class="mb-1"><strong>Location:</strong> <span th:text="${resource.location}"></span></p>
                                <p class="mb-0"><strong>Donor:</strong> <span th:text="${resource.user.fullName}"></span></p>
                            </div>

                            <!-- Assignment Form -->
                            <form th:action="@{/admin/resources/{id}/assign(id=${resource.id})}" method="post">
                                <div class="mb-3">
                                    <label for="volunteerId" class="form-label">
                                        <i class="bi bi-person"></i> Select Volunteer <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select" id="volunteerId" name="volunteerId" required>
                                        <option value="">Choose a volunteer...</option>
                                        <option th:each="volunteer : ${volunteers}" 
                                                th:value="${volunteer.id}"
                                                th:text="${volunteer.fullName + ' (' + volunteer.username + ')'}">
                                        </option>
                                    </select>
                                    <div class="form-text">Select an active volunteer for this delivery</div>
                                </div>

                                <div class="mb-3">
                                    <label for="notes" class="form-label">
                                        <i class="bi bi-sticky"></i> Delivery Notes (Optional)
                                    </label>
                                    <textarea class="form-control" id="notes" name="notes" rows="3" 
                                              placeholder="Add any special delivery instructions..."></textarea>
                                </div>

                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-success">
                                        <i class="bi bi-check-circle"></i> Assign to Volunteer
                                    </button>
                                    <a th:href="@{/admin/resources}" class="btn btn-secondary">
                                        <i class="bi bi-x-circle"></i> Cancel
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
<th:block th:replace="fragments/layout :: footer"></th:block>
<th:block th:replace="fragments/layout :: scripts"></th:block>
</body>
</html>
